name: supabase-backup

on:
  workflow_dispatch: # Manual trigger from the Actions tab
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC

jobs:
  run_db_backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_ENABLED: ${{ vars.BACKUP_ENABLED }} # Repository variable (true or false)
    steps:
      - name: Check if backups are enabled
        run: |
          if [ "$BACKUP_ENABLED" != "true" ]; then
            echo "Backups are disabled. Exiting workflow."
            exit 0
          fi

      - name: Checkout repository
        if: env.BACKUP_ENABLED == 'true'
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        if: env.BACKUP_ENABLED == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create backups folder
        if: env.BACKUP_ENABLED == 'true'
        run: mkdir -p prisma/backups

      - name: Backup roles
        if: env.BACKUP_ENABLED == 'true'
        run: supabase db dump --db-url "$SUPABASE_DB_URL" -f prisma/backups/roles.sql --role-only

      - name: Backup schema
        if: env.BACKUP_ENABLED == 'true'
        run: supabase db dump --db-url "$SUPABASE_DB_URL" -f prisma/backups/schema.sql

      - name: Backup data (excluding tables with OAuth tokens)
        if: env.BACKUP_ENABLED == 'true'
        run: |
          supabase db dump --db-url "$SUPABASE_DB_URL" \
            -f prisma/backups/data.sql \
            --data-only --use-copy
          # Strip COPY blocks for tables containing OAuth tokens.
          # Uses Python string matching so it works regardless of whether
          # pg_dump includes the schema prefix in the COPY statement.
          python3 << 'PYEOF'
          lines = open('prisma/backups/data.sql').readlines()
          out = []
          skip = False
          for line in lines:
              if not skip and 'FROM stdin' in line and ('"Account"' in line or '"Session"' in line):
                  skip = True
                  continue
              if skip:
                  if line.strip() == '\\.':
                      skip = False
                  continue
              out.append(line)
          open('prisma/backups/data.sql', 'w').writelines(out)
          PYEOF

      - name: Commit and push backups
        if: env.BACKUP_ENABLED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add prisma/backups/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Supabase backup"
            git push origin main
          fi